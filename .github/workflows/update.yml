name: Daily price update

on:
  schedule:
    # 23:00 UTC = 07:00 Taipei time (next day).
    # By 07:00 Taipei the previous day's US close (04:00-05:00 Taipei) is
    # final, and TW/JP/KR still show their own previous-day closes.
    - cron: "0 23 * * *"
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest prices
        run: python3 scripts/fetch_prices.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --quiet --cached || git commit -m "chore: daily price update ($(date -u +%Y-%m-%d))"
          git push

  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (latest, after data commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
